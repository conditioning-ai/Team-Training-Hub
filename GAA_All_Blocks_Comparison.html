<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaelic Football Programme · All Blocks</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0f0f0f; --surface:#181818; --border:#2a2a2a; --text:#f0ede8; --muted:#7a7570; --b1:#4be8a0; --b2:#e8b84b; --b3:#e86b4b; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { background:var(--bg); color:var(--text); font-family:'Barlow',sans-serif; }
  .top-nav { position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:stretch;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none; }
  .top-nav::-webkit-scrollbar { display:none; }
  .nav-brand { font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;padding:0 18px 0 16px;border-right:1px solid var(--border);white-space:nowrap;flex-shrink:0; }
  .nav-tabs { display:flex;align-items:stretch;flex-shrink:0; }
  .nav-tab { font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:0 18px;height:50px;display:flex;align-items:center;gap:8px;cursor:pointer;border:none;background:none;color:var(--muted);border-bottom:3px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap;flex-shrink:0; }
  .nav-tab:hover { color:var(--text); }
  .nav-tab.act-b1 { color:var(--b1);border-bottom-color:var(--b1); }
  .nav-tab.act-b2 { color:var(--b2);border-bottom-color:var(--b2); }
  .nav-tab.act-b3 { color:var(--b3);border-bottom-color:var(--b3); }
  .tdot { width:8px;height:8px;border-radius:50%;flex-shrink:0; }
  .tdot-b1 { background:var(--b1); } .tdot-b2 { background:var(--b2); } .tdot-b3 { background:var(--b3); }
  .view { display:none; } .view.active { display:block; }
  .col-stripe { height:3px;width:100%; }
  .col-b1 .col-stripe { background:var(--b1); } .col-b2 .col-stripe { background:var(--b2); } .col-b3 .col-stripe { background:var(--b3); }
  .block-inner { background:var(--bg); }
  .block-inner a { color:inherit;text-decoration:none; }
  .block-inner header { background:#181818;border-bottom:1px solid #2a2a2a;padding:22px 20px 16px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:10px; }
  .block-inner .session-label { font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#7a7570;margin-bottom:5px; }
  .block-inner h1 { font-family:'Barlow Condensed',sans-serif;font-weight:900;text-transform:uppercase;line-height:1;color:#f0ede8;font-size:clamp(26px,6vw,48px); }
  .block-inner .meta-chips { display:flex;gap:6px;flex-wrap:wrap; }
  .block-inner .chip { font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:5px 10px;border:1px solid #2a2a2a;border-radius:2px;color:#7a7570; }
  .col-b1 .block-inner .chip.highlight { border-color:#4be8a0;color:#4be8a0;background:rgba(75,232,160,.07); }
  .col-b2 .block-inner .chip.highlight { border-color:#e8b84b;color:#e8b84b;background:rgba(232,184,75,.07); }
  .col-b3 .block-inner .chip.highlight { border-color:#e86b4b;color:#e86b4b;background:rgba(232,107,75,.07); }
  .col-b1 .block-inner h1 span { color:#4be8a0; } .col-b2 .block-inner h1 span { color:#e8b84b; } .col-b3 .block-inner h1 span { color:#e86b4b; }
  .block-inner .intent { max-width:1400px;margin:20px auto 0;padding:0 16px;display:flex;gap:8px;flex-wrap:wrap; }
  .block-inner .intent-card { background:#181818;border:1px solid #2a2a2a;padding:12px 14px;flex:1;min-width:160px; }
  .block-inner .intent-label { font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#7a7570;margin-bottom:4px; }
  .block-inner .intent-text { font-size:13px;font-weight:500;color:#f0ede8;line-height:1.4; }
  .block-inner .session-timeline { max-width:1400px;margin:16px auto 0;padding:0 16px; }
  .block-inner .tl-full { display:flex;border:1px solid #2a2a2a;border-radius:2px;overflow:hidden;height:38px;margin-top:12px; }
  .block-inner .tl-block { display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#000;border-right:1px solid rgba(0,0,0,.2);text-align:center;line-height:1.2; }
  .block-inner .tl-labels { display:flex;justify-content:space-between;padding:4px 0; }
  .block-inner .tl-lbl { font-family:'Barlow Condensed',sans-serif;font-size:10px;color:#7a7570; }
  .block-inner .phases { max-width:1400px;margin:0 auto;padding:20px 16px;display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:2px; }
  .block-inner .phase { background:#181818;border:1px solid #2a2a2a;overflow:hidden;position:relative; }
  .block-inner .phase-header { padding:16px 18px 14px;border-bottom:1px solid #2a2a2a;position:relative; }
  .block-inner .phase-number { font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;margin-bottom:3px; }
  .block-inner .phase-title { font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;text-transform:uppercase;line-height:1.1;color:#f0ede8; }
  .block-inner .phase-duration { position:absolute;top:16px;right:18px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:#7a7570; }
  .block-inner .phase-accent { position:absolute;bottom:0;left:0;height:3px;width:100%; }
  .block-inner .phase-wu .phase-number { color:#4be8d8; } .block-inner .phase-wu .phase-accent { background:#4be8d8; }
  .block-inner .phase-run .phase-number { color:#4be8a0; } .block-inner .phase-run .phase-accent { background:#4be8a0; }
  .block-inner .phase-tempo .phase-number { color:#4baee8; } .block-inner .phase-tempo .phase-accent { background:#4baee8; }
  .block-inner .phase-gym .phase-number { color:#e8b84b; } .block-inner .phase-gym .phase-accent { background:#e8b84b; }
  .block-inner .phase-cycle .phase-number { color:#b44be8; } .block-inner .phase-cycle .phase-accent { background:#b44be8; }
  .col-b3 .block-inner .phase-gym .phase-number { color:#e86b4b; } .col-b3 .block-inner .phase-gym .phase-accent { background:#e86b4b; }
  .block-inner .phase-body { padding:0; }
  .block-inner .block { border-bottom:1px solid #2a2a2a; } .block-inner .block:last-child { border-bottom:none; }
  .block-inner .block-label { padding:10px 18px 0;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#7a7570; }
  .block-inner .exercises { list-style:none;padding:6px 0 12px; }
  .block-inner .exercises li { display:grid;grid-template-columns:1fr auto;align-items:baseline;padding:5px 18px;gap:10px;font-size:14px;line-height:1.35; }
  .block-inner .ex-name { font-weight:500;color:#f0ede8; }
  .block-inner .ex-name a { color:#f0ede8;border-bottom:1px dashed rgba(255,255,255,.15); }
  .block-inner .yt-icon { font-size:9px;opacity:.35;margin-left:3px; }
  .block-inner .ex-scheme { font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;white-space:nowrap; }
  .block-inner .phase-wu .ex-scheme { color:#4be8d8; } .block-inner .phase-run .ex-scheme { color:#4be8a0; }
  .block-inner .phase-tempo .ex-scheme { color:#4baee8; } .block-inner .phase-gym .ex-scheme { color:#e8b84b; }
  .block-inner .phase-cycle .ex-scheme { color:#b44be8; }
  .col-b3 .block-inner .phase-gym .ex-scheme { color:#e86b4b; }
  .block-inner .note-tag { display:flex;align-items:flex-start;gap:7px;margin:0 18px 12px;padding:7px 10px;border-radius:2px;font-size:12.5px;font-weight:500;line-height:1.4; }
  .block-inner .note-tag.rest  { background:rgba(255,255,255,.04);border-left:2px solid #2a2a2a;color:#7a7570; }
  .block-inner .note-tag.key   { background:rgba(255,255,255,.04);border-left:2px solid #7a7570;color:#b0ada8; }
  .block-inner .note-tag.green { background:rgba(75,232,160,.05); border-left:2px solid #4be8a0;color:#a0e0c0; }
  .block-inner .note-tag.gold  { background:rgba(241,196,15,.06); border-left:2px solid #f1c40f;color:#c8b040; }
  .block-inner .note-tag.red   { background:rgba(231,76,60,.06);  border-left:2px solid #e74c3c;color:#cc7070; }
  .block-inner .note-tag.opt   { background:rgba(232,184,75,.05); border-left:2px solid #e8b84b;color:#c0a870; }
  .block-inner .note-tag.blue  { background:rgba(52,152,219,.05); border-left:2px solid #3498db;color:#7ab8d8; }
  .block-inner .cues { padding:8px 18px 14px; }
  .block-inner .cue-item { display:flex;gap:8px;padding:3px 0;font-size:13px;color:#9a9590;line-height:1.4; }
  .block-inner .cue-dot { width:4px;height:4px;border-radius:50%;margin-top:6px;flex-shrink:0;background:#7a7570; }
  .block-inner .cycle-table,.block-inner .strength-table,.block-inner .tracker-table { width:calc(100% - 36px);margin:6px 18px 12px;border-collapse:collapse;font-size:12px; }
  .block-inner .cycle-table th,.block-inner .strength-table th,.block-inner .tracker-table th { font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:#7a7570;padding:5px 7px;border-bottom:1px solid #2a2a2a;text-align:left; }
  .block-inner .cycle-table td,.block-inner .strength-table td,.block-inner .tracker-table td { padding:6px 7px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:top;line-height:1.35;color:#f0ede8;font-weight:500; }
  .block-inner .cycle-table tr:last-child td,.block-inner .strength-table tr:last-child td,.block-inner .tracker-table tr:last-child td { border-bottom:none; }
  .block-inner .wk-label { font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;white-space:nowrap; }
  .block-inner .wk-label.foundation,.block-inner .wk-label.build1 { color:#3498db; }
  .block-inner .wk-label.transition,.block-inner .wk-label.build2 { color:#f1c40f; }
  .block-inner .wk-label.peak { color:#e74c3c; } .block-inner .wk-label.taper { color:#7a7570; }
  .block-inner .s-vo2 { color:#e74c3c; } .block-inner .s-tempo { color:#f1c40f; }
  .block-inner .pattern-badge { font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;white-space:nowrap; }
  .col-b1 .block-inner .pattern-badge { color:#4be8a0; } .col-b2 .block-inner .pattern-badge { color:#e8b84b; } .col-b3 .block-inner .pattern-badge { color:#e86b4b; }
  .block-inner .prog-cell { font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;white-space:nowrap;color:#4be8a0; }
  .block-inner .tracker-wk { font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;text-align:center; }
  .block-inner .done-box { font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:#7a7570;text-align:center; }
  .block-inner .constraint-list { list-style:none;padding:4px 18px 12px; }
  .block-inner .constraint-list li { display:flex;gap:8px;padding:4px 0;font-size:13px;font-weight:500;color:#f0ede8;border-bottom:1px solid rgba(255,255,255,.03);line-height:1.35; }
  .block-inner .constraint-list li:last-child { border-bottom:none; }
  .block-inner .c-marker { font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;letter-spacing:.1em;padding-top:2px;flex-shrink:0;white-space:nowrap; }
  .col-b1 .block-inner .c-marker { color:#4be8a0; } .col-b2 .block-inner .c-marker { color:#e8b84b; } .col-b3 .block-inner .c-marker { color:#e86b4b; }
  .block-inner .c-note { font-size:11.5px;color:#7a7570;display:block;margin-top:1px; }
  @media (max-width:600px) {
    .block-inner .cycle-table,.block-inner .strength-table,.block-inner .tracker-table { font-size:11px; }
    .block-inner header { padding:16px 14px 12px; }
    .block-inner .phases,.block-inner .intent,.block-inner .session-timeline { padding-left:10px;padding-right:10px; }
    .nav-brand { display:none; }
  }
</style>
</head>
<body>

<nav class="top-nav">
  <div class="nav-brand">TMC · Gaelic Football</div>
  <div class="nav-tabs">
    <button class="nav-tab act-b1" id="tab-b1" onclick="show('b1')"><span class="tdot tdot-b1"></span>Block 1</button>
    <button class="nav-tab"        id="tab-b2" onclick="show('b2')"><span class="tdot tdot-b2"></span>Block 2</button>
    <button class="nav-tab"        id="tab-b3" onclick="show('b3')"><span class="tdot tdot-b3"></span>Block 3</button>
  </div>
</nav>

<div class="view active col-b1" id="view-b1">
  <div class="col-stripe"></div>
  <div class="block-inner" id="b1c"></div>
</div>
<div class="view col-b2" id="view-b2">
  <div class="col-stripe"></div>
  <div class="block-inner" id="b2c"></div>
</div>
<div class="view col-b3" id="view-b3">
  <div class="col-stripe"></div>
  <div class="block-inner" id="b3c"></div>
</div>

<script>
const B1=`

<!-- ═══ HEADER ════════════════════════════════════════════════════ -->
<header>
  <div>
    <div class="session-label">Gaelic Football · Individual Conditioning Programme</div>
    <h1>6-Week <span>Gaelic Football</span><br>Conditioning Block</h1>
  </div>
  <div class="meta-chips">
    <div class="chip highlight">Senior Field Player</div>
    <div class="chip">6 Weeks · 3 Cycles</div>
    <div class="chip">2 Run Days</div>
    <div class="chip">2 Gym Days</div>
  </div>
</header>

<!-- ═══ INTENT CARDS ══════════════════════════════════════════════ -->
<div class="intent">
  <div class="intent-card">
    <div class="intent-label">Programme Goal</div>
    <div class="intent-text">Build field sport readiness through progressive aerobic-speed development. Two dedicated running sessions and two full-body strength sessions per week build every quality needed for game day.</div>
  </div>
  <div class="intent-card">
    <div class="intent-label">Structure</div>
    <div class="intent-text">Three 2-week cycles — Foundation (1:1), Transition (2:1), Peak (3:1) — with progressive overload built in across all sessions. Volume and density increase each cycle.</div>
  </div>
  <div class="intent-card">
    <div class="intent-label">Running Days</div>
    <div class="intent-text">Day 1: VO2 Max intervals — high intensity, strict work:rest. Day 2: Tempo runs — sub-maximal, rhythmical, mechanically sound. Every running session opens with a 12-minute RAMP warm-up.</div>
  </div>
  <div class="intent-card">
    <div class="intent-label">Gym Days</div>
    <div class="intent-text">Day A (Tue) and Day B (Fri). Each session opens with an extensive plyo circuit, then works through Squat, Hinge, Push, Pull, Rotate, Brace and Land/Jump. Log your weights every session.</div>
  </div>
</div>

<!-- ═══ WEEKLY STRUCTURE TIMELINE ════════════════════════════════ -->
<div class="session-timeline">
  <div class="tl-full">
    <div class="tl-block tl-ramp" style="flex:10">MON<br>VO2 RUN</div>
    <div class="tl-block tl-gym"  style="flex:11">TUE<br>GYM A</div>
    <div class="tl-block" style="flex:9;background:#1a1a1a;color:#555;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;">WED<br>SKILLS</div>
    <div class="tl-block tl-run1" style="flex:10">THU<br>TEMPO</div>
    <div class="tl-block tl-gym"  style="flex:11">FRI<br>GYM B</div>
    <div class="tl-block" style="flex:9;background:#1a1a1a;color:#555;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;">SAT<br>MATCH</div>
    <div class="tl-block" style="flex:6;background:#141414;color:#444;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;">SUN<br>REST</div>
  </div>
  <div class="tl-labels">
    <div class="tl-lbl">Mon</div>
    <div class="tl-lbl">Sun</div>
  </div>
</div>

<!-- ═══ PHASES ════════════════════════════════════════════════════ -->
<div class="phases">

  <!-- ── PHASE 1: RAMP WARM-UP ─────────────────────────────────── -->
  <div class="phase phase-wu">
    <div class="phase-header">
      <div class="phase-number">Running Days · All Sessions</div>
      <div class="phase-title">RAMP<br>Warm-Up</div>
      <div class="phase-duration">~12 min</div>
      <div class="phase-accent"></div>
    </div>
    <div class="phase-body">

      <div class="block">
        <div class="block-label">R — Raise (4 min)</div>
        <ul class="exercises">
          <li>
            <span class="ex-name"><a href="https://www.youtube.com/results?search_query=jogging+warm+up+field+sport" target="_blank">Easy jog 2 laps of pitch <span class="yt-icon">▶</span></a></span>
            <span class="ex-scheme">Continuous</span>
          </li>
          <li>
            <span class="ex-name"><a href="https://www.youtube.com/results?search_query=high+knees+butt+kicks+warm+up" target="_blank">High knees / Butt kicks <span class="yt-icon">▶</span></a></span>
            <span class="ex-scheme">× 20m each</span>
          </li>
          <li>
            <span class="ex-name">Lateral shuffle + arm circles</span>
            <span class="ex-scheme">× 20m e/s</span>
          </li>
        </ul>
      </div>

      <div class="block">
        <div class="block-label">A — Activate (4 min)</div>
        <ul class="exercises">
          <li>
            <span class="ex-name"><a href="https://www.youtube.com/results?search_query=glute+bridge+activation" target="_blank">Glute bridges <span class="yt-icon">▶</span></a></span>
            <span class="ex-scheme">× 15 reps</span>
          </li>
          <li>
            <span class="ex-name"><a href="https://www.youtube.com/results?search_query=bodyweight+squat+warm+up" target="_blank">Bodyweight squats <span class="yt-icon">▶</span></a></span>
            <span class="ex-scheme">× 15 reps</span>
          </li>
          <li>
            <span class="ex-name"><a href="https://www.youtube.com/results?search_query=walking+lunge+hip+flexor+stretch" target="_blank">Walking lunges + kneeling hip flexor <span class="yt-icon">▶</span></a></span>
            <span class="ex-scheme">× 10 e/s</span>
          </li>
          <li>
            <span class="ex-name"><a href="https://www.youtube.com/results?search_query=leg+swings+hip+mobility+warm+up" target="_blank">Leg swings — front/back + lateral <span class="yt-icon">▶</span></a></span>
            <span class="ex-scheme">× 10 e/s</span>
          </li>
        </ul>
      </div>

      <div class="block">
        <div class="block-label">M — Mobilise (2 min)</div>
        <ul class="exercises">
          <li>
            <span class="ex-name"><a href="https://www.youtube.com/results?search_query=worlds+greatest+stretch+mobility" target="_blank">World's greatest stretch <span class="yt-icon">▶</span></a></span>
            <span class="ex-scheme">× 5 e/s</span>
          </li>
          <li>
            <span class="ex-name"><a href="https://www.youtube.com/results?search_query=inchworm+exercise+warm+up" target="_blank">Inchworm <span class="yt-icon">▶</span></a></span>
            <span class="ex-scheme">× 5 reps</span>
          </li>
        </ul>
      </div>

      <div class="block">
        <div class="block-label">P — Potentiate (2 min)</div>
        <ul class="exercises">
          <li>
            <span class="ex-name"><a href="https://www.youtube.com/results?search_query=running+strides+speed+activation" target="_blank">Strides at 80% <span class="yt-icon">▶</span></a></span>
            <span class="ex-scheme">× 2 × 60m</span>
          </li>
          <li>
            <span class="ex-name">2–3 bounding steps into short acceleration</span>
            <span class="ex-scheme">Ready to run</span>
          </li>
        </ul>
      </div>

      <div class="cues">
        <div class="cue-item"><div class="cue-dot"></div>Never skip this — it's the difference between quality work and junk reps</div>
        <div class="cue-item"><div class="cue-dot"></div>The strides are the bridge: you're switching your system from warm-up to performance</div>
      </div>

    </div>
  </div>

  <!-- ── PHASE 2: RUNNING PROGRAMME — CYCLES 1–3 ──────────────── -->
  <div class="phase phase-cycle">
    <div class="phase-header">
      <div class="phase-number">Running Programme · 6 Weeks · 3 Cycles</div>
      <div class="phase-title">VO2 Max &amp;<br>Tempo Runs</div>
      <div class="phase-duration">See table</div>
      <div class="phase-accent"></div>
    </div>
    <div class="phase-body">

      <div class="block">
        <div class="block-label">Intensity Key</div>
        <ul class="exercises">
          <li>
            <span class="ex-name" style="color:var(--red)">VO2 Max (Day 1)</span>
            <span class="ex-scheme" style="color:var(--red)">RPE 8–9</span>
          </li>
          <li>
            <span class="ex-name" style="color:var(--gold)">Tempo (Day 2)</span>
            <span class="ex-scheme" style="color:var(--gold)">70–80% max velocity</span>
          </li>
        </ul>

        <ul class="constraint-list">
          <li>
            <span class="c-marker">Δ1</span>
            <div>
              Running Density is the Overload — Not Distance
              <span class="c-note">Flying sprints test true maximum velocity — something neither timed intervals nor distance repeats can isolate. Rest-pause 200m sets mirror the work-rate of the fourth quarter of a match. This is the most game-specific conditioning in the programme.</span>
            </div>
          </li>

            <span class="c-marker">Δ2</span>
            <div>

              <span class="c-note">Heavy compound lift paired with an explosive movement exploits post-activation potentiation — the nervous system fires harder in the plyometric after a maximal strength effort. This is the most powerful gym method for athletic power development.</span>
